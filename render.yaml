services:
  - type: web
    name: agenthub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_NAME
        value: AgentHub
      - key: VERSION
        value: "0.2"
